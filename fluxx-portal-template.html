{% assign pdc_globals = model.dyn_invoke_for(:pdc_globals) | default: {} %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/macfound/fluxx-pdc-integration@{{pdc_globals.environment | default: 'main'}}/css/pdc-panel.css">

<script>
var PDC_CONFIG = {
    // OAuth settings - populate from Fluxx organization/site settings
    clientId: '{{ pdc_globals.oauth_client_id }}',
    authEndpoint: '{{ pdc_globals.auth_endpoint | default: "https://auth.philanthropydatacommons.org/realms/pdc/protocol/openid-connect/auth" }}',
    tokenEndpoint: '{{ pdc_globals.token_endpoint | default: "https://auth.philanthropydatacommons.org/realms/pdc/protocol/openid-connect/token" }}',
    redirectUri: window.location.origin,
    
    // API settings
    apiBaseUrl: '{{ pdc_globals.api_url | default: "https://api.philanthropydatacommons.org" }}',
    // Storage namespace (prevents token collision if multiple orgs share browser)
    storagePrefix: 'pdc_{{ pdc_globals.client_id }}_',

    // OAuth scopes
    scope: 'openid profile roles'
};
</script>


<!-- ========================================================================
     MODULES (load in order from CDN)
     ======================================================================== -->
<script src="https://cdn.jsdelivr.net/gh/macfound/fluxx-pdc-integration@{{pdc_globals.environment | default: 'main'}}/js/pdc-oauth-client.js"></script>
<script src="https://cdn.jsdelivr.net/gh/macfound/fluxx-pdc-integration@{{pdc_globals.environment | default: 'main'}}/js/pdc-proposal-renderer.js"></script>
<script src="https://cdn.jsdelivr.net/gh/macfound/fluxx-pdc-integration@{{pdc_globals.environment | default: 'main'}}/js/pdc-panel-controller.js"></script>
<script src="https://cdn.jsdelivr.net/gh/macfound/fluxx-pdc-integration@{{pdc_globals.environment | default: 'main'}}/js/pdc-app.js"></script>
<!-- ========================================================================
     AUTH UI
     ======================================================================== -->
<div class="pdc-auth-container">
    
    <!-- Login section (shown when NOT authenticated) -->
    <div data-pdc="login-container">
        <button data-pdc="login-btn" class="pdc-auth-button">
            Connect to PDC
        </button>
    </div>

    <!-- Authenticated section (shown when authenticated) -->
    <div data-pdc="authenticated-container" class="hidden">
        <div class="pdc-user-info">
            <div>Connected as: <strong data-pdc="user-name"></strong></div>
            <div data-pdc="user-email"></div>
        </div>
        <button data-pdc="viewer-btn" class="pdc-auth-button">
            Launch PDC Proposals Viewer
        </button>
        <button data-pdc="logout-btn" class="pdc-auth-button">
            Disconnect from PDC
        </button>
    </div>
    
</div>


<!-- ========================================================================
     FLOATING PANEL (initially hidden)
     ======================================================================== -->
<div data-pdc="panel" class="pdc-floating-panel hidden">
    
    <div data-pdc="panel-header" class="pdc-panel-header">
        <h2>Proposal Explorer</h2>
        <div class="pdc-panel-controls">
            <button data-pdc="minimize-btn" title="Minimize">_</button>
            <button data-pdc="close-btn" title="Close">×</button>
        </div>
    </div>
    
    <div class="pdc-panel-search">
        <input type="text" 
               data-pdc="search-input" 
               placeholder="Search by opportunity or funder...">
    </div>
    
    <div data-pdc="panel-body" class="pdc-panel-body">
        <!-- Proposals rendered here dynamically -->
    </div>
    
</div>


<!-- ========================================================================
     INITIALIZATION
     ======================================================================== -->
<script>
(function() {
    // Wait for DOM ready
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initPDC);
    } else {
        initPDC();
    }
    
    function initPDC() {
        // Small delay to ensure all modules are loaded
        setTimeout(function() {
            if (typeof PDCApp !== 'undefined') {
                PDCApp.init();
                console.log('PDC Integration ready');
            } else {
                console.error('PDC modules failed to load');
            }
        }, 100);
    }
})();
</script>
